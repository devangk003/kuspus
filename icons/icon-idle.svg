<svg width="480" height="480" viewBox="272 246 480 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mintGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F2"/>
      <stop offset="72%" stop-color="#EEF4EE"/>
      <stop offset="100%" stop-color="#CDEFD9"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.302
                0 0 0 0 0.859
                0 0 0 0 0.651
                0 0 0 0.22 0"/>
    </filter>
  </defs>

  <!-- Left small -->
  <g>
    <rect x="288" y="402" width="64" height="146" rx="32" fill="url(#mintGradient)"/>
    <ellipse cx="320" cy="552" rx="42" ry="18" fill="#4DDBA6" opacity="0.18" filter="url(#softGlow)"/>
  </g>

  <!-- Left medium -->
  <g>
    <rect x="384" y="332" width="64" height="286" rx="32" fill="url(#mintGradient)"/>
    <ellipse cx="416" cy="622" rx="46" ry="20" fill="#4DDBA6" opacity="0.18" filter="url(#softGlow)"/>
  </g>

  <!-- Center -->
  <g>
    <rect x="480" y="260" width="64" height="424" rx="32" fill="url(#mintGradient)"/>
    <ellipse cx="512" cy="690" rx="50" ry="22" fill="#4DDBA6" opacity="0.2" filter="url(#softGlow)"/>
  </g>

  <!-- Right medium -->
  <g>
    <rect x="576" y="332" width="64" height="286" rx="32" fill="url(#mintGradient)"/>
    <ellipse cx="608" cy="622" rx="46" ry="20" fill="#4DDBA6" opacity="0.18" filter="url(#softGlow)"/>
  </g>

  <!-- Right small -->
  <g>
    <rect x="672" y="402" width="64" height="146" rx="32" fill="url(#mintGradient)"/>
    <ellipse cx="704" cy="552" rx="42" ry="18" fill="#4DDBA6" opacity="0.18" filter="url(#softGlow)"/>
  </g>
</svg>